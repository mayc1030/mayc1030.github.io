bio_short: "Desarrollador con capacidad analítica, orientado al trabajo en equipo y al aprendizaje continuo."
bio_short_en: "Developer with analytical skills, team-oriented and committed to continuous learning."
bio_long: |
  Ingeniero de Sistemas con más de 10 años diseñando y desarrollando plataformas web escalables, arquitecturas Headless CMS y microservicios. Amplia experiencia en PHP, especialmente con Drupal, y conocimientos en Laravel, JavaScript, Python, React, Node.js y bases de datos relacionales. Experiencia en el desarrollo de APIs REST, integración con sistemas externos y optimización de aplicaciones web. Reconocido por la capacidad de adaptarse a nuevos proyectos, desarrollar soluciones de calidad y trabajar de forma colaborativa bajo metodologías ágiles Scrum.

bio_long_en: |
  Systems Engineer with over 10 years of experience designing and developing scalable web platforms, Headless CMS architectures, and microservices. Extensive experience in PHP, especially with Drupal, and proficiency in Laravel, JavaScript, Python, React, Node.js, and relational databases. Experienced in developing REST APIs, integrating external systems, and optimizing web applications. Recognized for the ability to adapt to new projects, deliver high-quality solutions, and work collaboratively under Agile Scrum methodologies.

