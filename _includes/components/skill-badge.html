<div class="skill-pill">
  {% if include.skill.icon_url %}
    <img src="{{ include.skill.icon_url }}" alt="{{ include.skill.name }}" class="skill-pill__icon skill-pill__icon--img" width="22" height="22" loading="lazy">
  {% elsif include.skill.icon %}
    <i class="{{ include.skill.icon }} skill-pill__icon" aria-hidden="true"></i>
  {% endif %}
  <span class="skill-pill__name">{{ include.skill.name }}</span>
</div>
