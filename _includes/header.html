<header class="site-header" role="banner">
  <div class="container header-inner">

    <a href="/" class="site-logo" aria-label="Inicio">
      {{ site.author.name | split: " " | first }}<span>.</span>
    </a>

    <nav class="site-nav" id="site-nav" role="navigation" aria-label="Navegación principal">
      <a href="/#sobre-mi" data-i18n="nav.about">Sobre mí</a>
      <a href="/#experiencia" data-i18n="nav.experience">Experiencia</a>
      <a href="/#proyectos" data-i18n="nav.projects">Proyectos</a>
      <a href="/#skills" data-i18n="nav.skills">Skills</a>
      <a href="/#contacto" data-i18n="nav.contact">Contacto</a>
      <a href="/blog/" data-i18n="nav.blog" {% if page.url contains '/blog' %}aria-current="page"{% endif %}>Blog</a>
    </nav>

    <div class="header-actions">

      <button class="search-btn" id="search-btn" aria-label="Buscar" title="Buscar">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>

      <button class="lang-toggle" id="lang-toggle" aria-label="Cambiar idioma / Change language" title="Cambiar idioma">
        <span class="lang-toggle__es">ES</span>
        <span class="lang-toggle__sep">|</span>
        <span class="lang-toggle__en">EN</span>
      </button>

      <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema" title="Cambiar tema">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>

      <button class="nav-toggle" id="nav-toggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>
</header>

<div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="Buscar posts" hidden>
  <div class="search-overlay__backdrop"></div>
  <div class="search-overlay__panel">
    <div class="search-overlay__input-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="search-overlay__icon">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="search"
        id="search-overlay-input"
        class="search-overlay__input"
        placeholder="Buscar posts..."
        autocomplete="off"
        spellcheck="false"
        aria-label="Buscar posts">
      <button class="search-overlay__close" id="search-overlay-close" aria-label="Cerrar búsqueda">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        <span style="font-size:.7rem;font-weight:600;opacity:.6;line-height:1">ESC</span>
      </button>
    </div>
    <div class="search-overlay__results" id="search-overlay-results" role="list" aria-live="polite"></div>
  </div>
</div>
