<!DOCTYPE html>
<html lang="{{ site.lang | default: 'es' }}" data-theme="light" data-lang="es">
<head>
  <script>
    (function(){
      var t=localStorage.getItem('theme'),l=localStorage.getItem('lang');
      if(t) document.documentElement.setAttribute('data-theme',t);
      if(l) document.documentElement.setAttribute('data-lang',l);
    })();
  </script>
  {% include head.html %}
</head>
<body>

  <div class="site-loader" id="site-loader" aria-hidden="true">
    <div class="site-loader__icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 18 22 12 16 6"/>
        <polyline points="8 6 2 12 8 18"/>
      </svg>
    </div>
    <p class="site-loader__name">Maycol<span>.</span></p>
    <div class="site-loader__bar"><span></span></div>
  </div>

  {% include header.html %}

  <main id="main-content" role="main">
    {{ content }}
  </main>

  {% include footer.html %}

  <button class="back-to-top" id="back-to-top" aria-label="Volver arriba">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(-90deg);" aria-hidden="true">
      <polyline points="16 18 22 12 16 6"/>
      <polyline points="8 6 2 12 8 18"/>
      <line x1="14" y1="4" x2="10" y2="20"/>
    </svg>
  </button>

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>

</body>
</html>
